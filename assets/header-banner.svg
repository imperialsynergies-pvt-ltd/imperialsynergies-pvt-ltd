<svg xmlns="http://www.w3.org/2000/svg" width="900" height="200" viewBox="0 0 900 200">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#060606"/>
      <stop offset="30%" stop-color="#0e0e0e"/>
      <stop offset="70%" stop-color="#121212"/>
      <stop offset="100%" stop-color="#080808"/>
    </linearGradient>
    <linearGradient id="topFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6a6a6a"/>
      <stop offset="100%" stop-color="#505050"/>
    </linearGradient>
    <linearGradient id="leftFace" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a4a4a"/>
      <stop offset="100%" stop-color="#2a2a2a"/>
    </linearGradient>
    <linearGradient id="rightFace" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0920e"/>
      <stop offset="100%" stop-color="#c47009"/>
    </linearGradient>
    <linearGradient id="topFaceLight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#787878"/>
      <stop offset="100%" stop-color="#5a5a5a"/>
    </linearGradient>
    <linearGradient id="leftFaceLight" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#555555"/>
      <stop offset="100%" stop-color="#353535"/>
    </linearGradient>
    <linearGradient id="rightFaceLight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5a623"/>
      <stop offset="100%" stop-color="#d4880c"/>
    </linearGradient>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#ffffff" stroke-opacity="0.02" stroke-width="0.5"/>
    </pattern>
    <filter id="boxGlow">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#e8750a" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bgGrad)"/>
  <rect width="900" height="200" fill="url(#grid)"/>
  
  <!-- Ambient glow -->
  <ellipse cx="450" cy="100" rx="350" ry="100" fill="#e8750a" opacity="0.035"/>
  <ellipse cx="200" cy="100" rx="200" ry="120" fill="#e8750a" opacity="0.02"/>
  <ellipse cx="700" cy="100" rx="200" ry="120" fill="#e8750a" opacity="0.02"/>

  <!-- 3D BOX CLUSTER - LEFT -->
  <g transform="translate(30, 20)" opacity="0.5" filter="url(#boxGlow)">
    <polygon points="45,0 90,22 45,45 0,22" fill="url(#topFaceLight)"/>
    <polygon points="0,22 45,45 45,100 0,77" fill="url(#leftFaceLight)"/>
    <polygon points="45,45 90,22 90,77 45,100" fill="url(#rightFaceLight)"/>
  </g>
  <g transform="translate(65, -5)" opacity="0.4">
    <polygon points="30,0 60,15 30,30 0,15" fill="url(#topFace)"/>
    <polygon points="0,15 30,30 30,65 0,50" fill="url(#leftFace)"/>
    <polygon points="30,30 60,15 60,50 30,65" fill="url(#rightFace)"/>
  </g>
  <g transform="translate(15, 130)" opacity="0.3">
    <polygon points="18,0 36,9 18,18 0,9" fill="url(#topFace)"/>
    <polygon points="0,9 18,18 18,42 0,33" fill="url(#leftFace)"/>
    <polygon points="18,18 36,9 36,33 18,42" fill="url(#rightFace)"/>
  </g>
  <g transform="translate(140, 140)" opacity="0.2">
    <polygon points="12,0 24,6 12,12 0,6" fill="url(#topFace)"/>
    <polygon points="0,6 12,12 12,28 0,22" fill="url(#leftFace)"/>
    <polygon points="12,12 24,6 24,22 12,28" fill="url(#rightFace)"/>
  </g>

  <!-- 3D BOX CLUSTER - RIGHT -->
  <g transform="translate(750, 10)" opacity="0.5" filter="url(#boxGlow)">
    <polygon points="50,0 100,25 50,50 0,25" fill="url(#topFaceLight)"/>
    <polygon points="0,25 50,50 50,110 0,85" fill="url(#leftFaceLight)"/>
    <polygon points="50,50 100,25 100,85 50,110" fill="url(#rightFaceLight)"/>
  </g>
  <g transform="translate(780, -15)" opacity="0.4">
    <polygon points="32,0 64,16 32,32 0,16" fill="url(#topFace)"/>
    <polygon points="0,16 32,32 32,68 0,52" fill="url(#leftFace)"/>
    <polygon points="32,32 64,16 64,52 32,68" fill="url(#rightFace)"/>
  </g>
  <g transform="translate(845, 130)" opacity="0.3">
    <polygon points="16,0 32,8 16,16 0,8" fill="url(#topFace)"/>
    <polygon points="0,8 16,16 16,38 0,30" fill="url(#leftFace)"/>
    <polygon points="16,16 32,8 32,30 16,38" fill="url(#rightFace)"/>
  </g>
  <g transform="translate(710, 145)" opacity="0.2">
    <polygon points="12,0 24,6 12,12 0,6" fill="url(#topFace)"/>
    <polygon points="0,6 12,12 12,28 0,22" fill="url(#leftFace)"/>
    <polygon points="12,12 24,6 24,22 12,28" fill="url(#rightFace)"/>
  </g>

  <!-- Floating particles -->
  <circle cx="170" cy="60" r="1.5" fill="#e8750a" opacity="0.4"/>
  <circle cx="230" cy="170" r="1" fill="#e8750a" opacity="0.3"/>
  <circle cx="670" cy="50" r="1.5" fill="#e8750a" opacity="0.4"/>
  <circle cx="730" cy="180" r="1" fill="#e8750a" opacity="0.3"/>
  <circle cx="450" cy="20" r="1" fill="#ffffff" opacity="0.15"/>
  <circle cx="350" cy="185" r="1" fill="#ffffff" opacity="0.1"/>
  <circle cx="550" cy="190" r="1" fill="#ffffff" opacity="0.1"/>
</svg>
