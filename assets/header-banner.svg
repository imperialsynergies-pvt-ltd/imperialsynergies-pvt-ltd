<svg xmlns="http://www.w3.org/2000/svg" width="900" height="320" viewBox="0 0 900 320">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="50%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="orangeGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ea8c0e"/>
      <stop offset="100%" stop-color="#c2710a"/>
    </linearGradient>
    <linearGradient id="darkGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#555555"/>
      <stop offset="100%" stop-color="#3a3a3a"/>
    </linearGradient>
    <linearGradient id="darkGrad2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4a4a4a"/>
      <stop offset="100%" stop-color="#333333"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#e8750a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#e8750a" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e8750a" stop-opacity="0"/>
      <stop offset="20%" stop-color="#e8750a" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#f59e0b" stop-opacity="1"/>
      <stop offset="80%" stop-color="#e8750a" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#e8750a" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="topFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#666666"/>
      <stop offset="100%" stop-color="#4d4d4d"/>
    </linearGradient>
    <linearGradient id="rightFace" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0920e"/>
      <stop offset="100%" stop-color="#c47009"/>
    </linearGradient>
    <linearGradient id="leftFace" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a4a4a"/>
      <stop offset="100%" stop-color="#2d2d2d"/>
    </linearGradient>
    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="0.5"/>
    </pattern>
    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="320" fill="url(#bgGrad)"/>
  <rect width="900" height="320" fill="url(#grid)"/>
  
  <!-- Ambient glow -->
  <ellipse cx="450" cy="160" rx="350" ry="200" fill="#e8750a" opacity="0.04"/>
  <ellipse cx="450" cy="200" rx="200" ry="100" fill="#e8750a" opacity="0.06"/>

  <!-- === 3D ISOMETRIC BOXES === -->
  
  <!-- Large box - back left -->
  <g transform="translate(80, 90)" opacity="0.35">
    <!-- Top face -->
    <polygon points="40,0 80,20 40,40 0,20" fill="url(#topFace)"/>
    <!-- Left face -->
    <polygon points="0,20 40,40 40,90 0,70" fill="url(#leftFace)"/>
    <!-- Right face -->
    <polygon points="40,40 80,20 80,70 40,90" fill="url(#rightFace)"/>
  </g>

  <!-- Medium box - far left -->
  <g transform="translate(30, 180)" opacity="0.2">
    <polygon points="30,0 60,15 30,30 0,15" fill="url(#topFace)"/>
    <polygon points="0,15 30,30 30,65 0,50" fill="url(#leftFace)"/>
    <polygon points="30,30 60,15 60,50 30,65" fill="url(#rightFace)"/>
  </g>
  
  <!-- Small box - top center-left -->
  <g transform="translate(200, 50)" opacity="0.25">
    <polygon points="25,0 50,12 25,25 0,12" fill="url(#topFace)"/>
    <polygon points="0,12 25,25 25,55 0,42" fill="url(#leftFace)"/>
    <polygon points="25,25 50,12 50,42 25,55" fill="url(#rightFace)"/>
  </g>

  <!-- Large box - right side -->
  <g transform="translate(740, 60)" opacity="0.35">
    <polygon points="45,0 90,22 45,45 0,22" fill="url(#topFace)"/>
    <polygon points="0,22 45,45 45,100 0,77" fill="url(#leftFace)"/>
    <polygon points="45,45 90,22 90,77 45,100" fill="url(#rightFace)"/>
  </g>

  <!-- Medium box - far right -->
  <g transform="translate(810, 170)" opacity="0.25">
    <polygon points="30,0 60,15 30,30 0,15" fill="url(#topFace)"/>
    <polygon points="0,15 30,30 30,60 0,45" fill="url(#leftFace)"/>
    <polygon points="30,30 60,15 60,45 30,60" fill="url(#rightFace)"/>
  </g>

  <!-- Small box - bottom right -->
  <g transform="translate(700, 210)" opacity="0.2">
    <polygon points="20,0 40,10 20,20 0,10" fill="url(#topFace)"/>
    <polygon points="0,10 20,20 20,45 0,35" fill="url(#leftFace)"/>
    <polygon points="20,20 40,10 40,35 20,45" fill="url(#rightFace)"/>
  </g>

  <!-- Tiny box - top right -->
  <g transform="translate(660, 40)" opacity="0.15">
    <polygon points="15,0 30,7 15,15 0,7" fill="url(#topFace)"/>
    <polygon points="0,7 15,15 15,35 0,27" fill="url(#leftFace)"/>
    <polygon points="15,15 30,7 30,27 15,35" fill="url(#rightFace)"/>
  </g>

  <!-- Tiny box - left mid -->
  <g transform="translate(150, 220)" opacity="0.18">
    <polygon points="18,0 36,9 18,18 0,9" fill="url(#topFace)"/>
    <polygon points="0,9 18,18 18,40 0,31" fill="url(#leftFace)"/>
    <polygon points="18,18 36,9 36,31 18,40" fill="url(#rightFace)"/>
  </g>

  <!-- === HORIZONTAL ACCENT LINES === -->
  <line x1="160" y1="135" x2="330" y2="135" stroke="url(#lineGrad)" stroke-width="1.5" opacity="0.5"/>
  <line x1="570" y1="135" x2="740" y2="135" stroke="url(#lineGrad)" stroke-width="1.5" opacity="0.5"/>
  <line x1="200" y1="215" x2="700" y2="215" stroke="url(#lineGrad)" stroke-width="0.8" opacity="0.25"/>

  <!-- === MAIN TEXT === -->
  <g filter="url(#shadow)">
    <text x="450" y="155" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="800" letter-spacing="3">
      <tspan fill="#ffffff">IMPERIAL </tspan><tspan fill="#e8750a">SYNERGIES</tspan>
    </text>
  </g>
  
  <!-- Subtitle -->
  <text x="450" y="185" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#999999" letter-spacing="8" font-weight="300">
    ( PVT ) LTD.
  </text>

  <!-- Tagline -->
  <text x="450" y="248" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#bbbbbb" letter-spacing="2" font-weight="400">
    Crafting Excellence in Every Package
  </text>

  <!-- Bottom accent line -->
  <rect x="380" y="260" width="140" height="2" rx="1" fill="url(#orangeGrad)" opacity="0.6"/>

  <!-- Bottom fade -->
  <rect x="0" y="300" width="900" height="20" fill="url(#bgGrad)" opacity="0.8"/>
</svg>
