<svg xmlns="http://www.w3.org/2000/svg" width="900" height="140" viewBox="0 0 900 140">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f0f0f"/>
      <stop offset="50%" stop-color="#161616"/>
      <stop offset="100%" stop-color="#0f0f0f"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#141414"/>
    </linearGradient>
    <linearGradient id="orangeAccent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#e8750a"/>
    </linearGradient>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="140" rx="12" fill="url(#bgGrad)"/>
  <rect width="900" height="140" rx="12" fill="none" stroke="#e8750a" stroke-opacity="0.1" stroke-width="1"/>

  <!-- Card 1: Products -->
  <g filter="url(#cardShadow)">
    <rect x="30" y="20" width="190" height="100" rx="10" fill="url(#cardGrad)"/>
    <rect x="30" y="20" width="190" height="100" rx="10" fill="none" stroke="#ffffff" stroke-opacity="0.05"/>
    <rect x="30" y="20" width="4" height="100" rx="2" fill="url(#orangeAccent)"/>
    <!-- 3D mini box icon -->
    <g transform="translate(50, 36)">
      <polygon points="12,0 24,6 12,12 0,6" fill="#555"/>
      <polygon points="0,6 12,12 12,26 0,20" fill="#3a3a3a"/>
      <polygon points="12,12 24,6 24,20 12,26" fill="#e8750a"/>
    </g>
    <text x="85" y="55" font-family="'Segoe UI', Arial, sans-serif" font-size="28" fill="#ffffff" font-weight="800">5+</text>
    <text x="50" y="95" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#999999" letter-spacing="2" font-weight="500">PRODUCT LINES</text>
  </g>

  <!-- Card 2: Partners -->
  <g filter="url(#cardShadow)">
    <rect x="245" y="20" width="190" height="100" rx="10" fill="url(#cardGrad)"/>
    <rect x="245" y="20" width="190" height="100" rx="10" fill="none" stroke="#ffffff" stroke-opacity="0.05"/>
    <rect x="245" y="20" width="4" height="100" rx="2" fill="url(#orangeAccent)"/>
    <g transform="translate(265, 36)">
      <polygon points="12,0 24,6 12,12 0,6" fill="#555"/>
      <polygon points="0,6 12,12 12,26 0,20" fill="#3a3a3a"/>
      <polygon points="12,12 24,6 24,20 12,26" fill="#e8750a"/>
    </g>
    <text x="300" y="55" font-family="'Segoe UI', Arial, sans-serif" font-size="28" fill="#ffffff" font-weight="800">50+</text>
    <text x="265" y="95" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#999999" letter-spacing="2" font-weight="500">TRUSTED PARTNERS</text>
  </g>

  <!-- Card 3: Quality -->
  <g filter="url(#cardShadow)">
    <rect x="460" y="20" width="190" height="100" rx="10" fill="url(#cardGrad)"/>
    <rect x="460" y="20" width="190" height="100" rx="10" fill="none" stroke="#ffffff" stroke-opacity="0.05"/>
    <rect x="460" y="20" width="4" height="100" rx="2" fill="url(#orangeAccent)"/>
    <g transform="translate(480, 36)">
      <polygon points="12,0 24,6 12,12 0,6" fill="#555"/>
      <polygon points="0,6 12,12 12,26 0,20" fill="#3a3a3a"/>
      <polygon points="12,12 24,6 24,20 12,26" fill="#e8750a"/>
    </g>
    <text x="515" y="55" font-family="'Segoe UI', Arial, sans-serif" font-size="28" fill="#ffffff" font-weight="800">100%</text>
    <text x="480" y="95" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#999999" letter-spacing="2" font-weight="500">QUALITY FOCUSED</text>
  </g>

  <!-- Card 4: Nationwide -->
  <g filter="url(#cardShadow)">
    <rect x="675" y="20" width="195" height="100" rx="10" fill="url(#cardGrad)"/>
    <rect x="675" y="20" width="195" height="100" rx="10" fill="none" stroke="#ffffff" stroke-opacity="0.05"/>
    <rect x="675" y="20" width="4" height="100" rx="2" fill="url(#orangeAccent)"/>
    <g transform="translate(695, 36)">
      <polygon points="12,0 24,6 12,12 0,6" fill="#555"/>
      <polygon points="0,6 12,12 12,26 0,20" fill="#3a3a3a"/>
      <polygon points="12,12 24,6 24,20 12,26" fill="#e8750a"/>
    </g>
    <text x="730" y="55" font-family="'Segoe UI', Arial, sans-serif" font-size="28" fill="#ffffff" font-weight="800">PK</text>
    <text x="695" y="95" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#999999" letter-spacing="2" font-weight="500">NATIONWIDE REACH</text>
  </g>
</svg>
